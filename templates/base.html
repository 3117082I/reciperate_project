<!DOCTYPE html>

{% load staticfiles %}
{% load reciperate_template_tags %}
<html>
<head>
    <title>
        Reciperate{% block title_block %} {% endblock %}</title>
    <link rel = "stylesheet" href=" "{static 'css/style.css' %}">
</head>
<body>
<div class="navbar">
    <a href = "{% url 'home' %}">Home</a>
    <a href = "{% url 'breakfast' %}">Breakfast</a>
    <a href = "{% url 'lunch' %}">Lunch</a>
    <a href = "{% url 'dinner' %}">Dinner</a>

    {%if user.is_authenticated %}
    <a href = "{% url 'add_recipe' %}">Add a recipe</a>
    <a href = "{% url 'sign_out' %}">Sign Out</a>
    {% else %}
    <a href = "{% url 'sign_in' %}">Sign in</a>
    <a href = "{% url 'sign_up' %}">Sign up</a>
</div>

<div>


</div>
</div>
</body>
</html>
