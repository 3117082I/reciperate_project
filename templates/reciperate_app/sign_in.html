{% extends 'reciperate_app/base.html' %}
{% load staticfiles %}

{% block title_block %}
    Sign In
{% endblock %}

{% block body_block %}
        <header class= "signHeader">
            <h1>Sign In</h1>
        </header>
    <div class="signInDiv">
        <form method="post" action="{% url 'reciperate:sign_in' %}">
            {% csrf_token %}
            Username: <input type="text" name="username" size="50" />
            <br />
            Password: <input type="password" name="password" size="50" />
            <br />
            <input type="submit" value="Sign In" />
        </form>
    </div>
{% endblock %}
